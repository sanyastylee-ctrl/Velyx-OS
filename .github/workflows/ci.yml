name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Установить зависимости
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-wayland \
            qml-qt6 \
            qt6-tools-dev-tools \
            cargo

      - name: Настроить CMake
        run: cmake -S . -B build -G Ninja

      - name: Собрать UI-часть
        run: cmake --build build

      - name: Проверить Rust fmt
        working-directory: services
        run: cargo fmt --all --check

      - name: Проверить Rust clippy
        working-directory: services
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Запустить Rust tests
        working-directory: services
        run: cargo test --workspace
